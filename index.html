<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>folio — PDF Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080809;
  --bg2:#0d0d10;
  --bg3:#121215;
  --bg4:#18181c;
  --bg5:#1e1e24;
  --border:#1e1e24;
  --border2:#2a2a34;
  --border3:#363644;
  --text:#f0f0f5;
  --text2:#a0a0b8;
  --text3:#484860;
  --amber:#d4924a;
  --amber2:#e8a860;
  --amber-dim:rgba(212,146,74,0.08);
  --amber-glow:rgba(212,146,74,0.04);
  --amber-mid:rgba(212,146,74,0.15);
  --amber-bright:rgba(212,146,74,0.25);
  --red:#e05555;
  --green:#3dba7a;
  --f-display:'Playfair Display',serif;
  --f-sans:'Syne',sans-serif;
  --f-mono:'DM Mono',monospace;
  --r:12px;
  --r2:8px;
  --r3:6px;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--f-sans);font-size:14px;line-height:1.6}

/* ── GRAIN OVERLAY ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;
}

/* ── AMBIENT GLOW ── */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ambient-orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.06;animation:ambientDrift 12s ease-in-out infinite}
.ambient-orb:nth-child(1){width:600px;height:600px;background:var(--amber);top:-200px;right:-100px;animation-delay:0s}
.ambient-orb:nth-child(2){width:400px;height:400px;background:#6060c0;bottom:-100px;left:-100px;animation-delay:-6s;opacity:0.04}
@keyframes ambientDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,30px) scale(1.1)}}

/* ── SHELL ── */
.shell{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

/* ════ TOPBAR ════ */
.topbar{
  height:52px;display:flex;align-items:center;gap:14px;padding:0 24px;
  border-bottom:1px solid var(--border2);
  background:linear-gradient(180deg,rgba(8,8,9,0.98) 0%,rgba(8,8,9,0.92) 100%);
  backdrop-filter:blur(20px);flex-shrink:0;z-index:100;
  position:relative;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:24px;right:24px;height:1px;
  background:linear-gradient(90deg,transparent,var(--amber-mid),transparent);
  opacity:0.4;
}
.wordmark{
  font-family:var(--f-display);font-size:22px;color:var(--text);
  letter-spacing:-0.03em;display:flex;align-items:center;gap:1px;
  font-weight:600;
}
.wordmark em{color:var(--amber);font-style:italic;font-weight:400}
.wordmark-dot{
  width:4px;height:4px;border-radius:50%;background:var(--amber);
  margin-left:3px;margin-bottom:4px;
  box-shadow:0 0 6px var(--amber);
  animation:dotPulse 3s ease-in-out infinite;
}
@keyframes dotPulse{0%,100%{opacity:1;box-shadow:0 0 6px var(--amber)}50%{opacity:0.5;box-shadow:0 0 2px var(--amber)}}

.tb-div{width:1px;height:18px;background:var(--border3);margin:0 2px}
.tb-spacer{flex:1}

.tb-status{display:flex;align-items:center;gap:7px;font-family:var(--f-mono);font-size:11px;color:var(--text3);letter-spacing:0.02em}
.orb{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green),0 0 16px rgba(61,186,122,0.3);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  flex-shrink:0;
}
.orb.thinking{
  background:var(--amber);
  box-shadow:0 0 8px var(--amber),0 0 20px rgba(212,146,74,0.4);
  animation:orbThink 1.4s ease-in-out infinite;
}
.orb.off{background:var(--text3);box-shadow:none}
@keyframes orbThink{
  0%,100%{transform:scale(1);opacity:1}
  50%{transform:scale(1.6);opacity:0.7}
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.tb-badge{
  font-family:var(--f-mono);font-size:10px;color:var(--text3);
  border:1px solid var(--border2);border-radius:99px;padding:3px 12px;
  background:var(--bg3);letter-spacing:0.02em;
  transition:all 0.3s;
}
.model-pill{
  font-family:var(--f-mono);font-size:10px;color:var(--amber);
  border:1px solid rgba(212,146,74,0.2);border-radius:99px;padding:3px 12px;
  background:var(--amber-dim);letter-spacing:0.02em;
  position:relative;overflow:hidden;
}
.model-pill::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(212,146,74,0.08),transparent);
  transform:translateX(-100%);animation:pillSheen 4s ease-in-out infinite;
}
@keyframes pillSheen{0%{transform:translateX(-100%)}30%,100%{transform:translateX(200%)}}

/* ════ BODY ════ */
.body{display:flex;flex:1;overflow:hidden}

/* ════ LEFT PANEL ════ */
.left{
  width:268px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg);
  border-right:1px solid var(--border2);
  overflow:hidden;
  position:relative;
}
.left::before{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,var(--amber-mid),transparent 60%);
  opacity:0.3;pointer-events:none;z-index:1;
}

.tab-row{display:flex;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg);position:relative}
.tab-btn{
  flex:1;padding:12px 0;background:none;border:none;color:var(--text3);
  font-family:var(--f-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.tab-btn::before{content:'';position:absolute;inset:0;background:var(--amber-glow);opacity:0;transition:opacity 0.2s}
.tab-btn:hover{color:var(--text2)}
.tab-btn:hover::before{opacity:1}
.tab-btn.act{color:var(--amber)}
.tab-btn.act::after{
  content:'';position:absolute;bottom:0;left:10%;right:10%;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--amber),transparent);
  border-radius:99px;
}
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:14px;height:14px;padding:0 4px;
  background:var(--amber-dim);border:1px solid rgba(212,146,74,0.2);
  border-radius:99px;font-size:9px;font-family:var(--f-mono);color:var(--amber);margin-left:4px;
}
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

/* upload zone */
.uz{
  margin:16px;border:1px dashed var(--border3);border-radius:var(--r);
  padding:32px 16px;display:flex;flex-direction:column;align-items:center;
  gap:10px;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  text-align:center;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--bg3),var(--bg2));
}
.uz::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,var(--amber-dim),transparent 70%);
  opacity:0;transition:opacity 0.3s;
}
.uz:hover,.uz.over{border-color:var(--amber);transform:scale(1.01)}
.uz:hover::before,.uz.over::before{opacity:1}

.uz-icon{
  width:44px;height:54px;position:relative;margin-bottom:6px;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.uz:hover .uz-icon{transform:translateY(-3px) scale(1.05)}
.uz-page{
  width:34px;height:44px;border:1.5px solid var(--border3);border-radius:4px;
  position:absolute;bottom:0;left:0;background:var(--bg4);transition:border-color 0.3s;
}
.uz-page-lines{position:absolute;bottom:8px;left:6px;right:6px;display:flex;flex-direction:column;gap:3px}
.uz-page-line{height:1.5px;background:var(--border3);border-radius:1px;transition:background 0.3s}
.uz-page-line:last-child{width:65%}
.uz-fold{
  width:12px;height:12px;position:absolute;top:0;right:0;
  background:var(--bg4);border-left:1.5px solid var(--border3);border-bottom:1.5px solid var(--border3);
  border-radius:0 0 0 3px;transition:border-color 0.3s;
}
.uz:hover .uz-page,.uz.over .uz-page{border-color:var(--amber)}
.uz:hover .uz-fold,.uz.over .uz-fold{border-color:var(--amber)}
.uz:hover .uz-page-line,.uz.over .uz-page-line{background:rgba(212,146,74,0.3)}

.uz-label{font-family:var(--f-sans);font-size:13px;color:var(--text2);line-height:1.5}
.uz-label strong{color:var(--text);font-weight:600;display:block;font-size:14px;margin-bottom:2px}
.uz-hint{font-family:var(--f-mono);font-size:10px;color:var(--text3)}

/* progress */
.prog-wrap{
  margin:0 16px 12px;background:var(--bg3);border-radius:var(--r2);
  padding:12px 14px;border:1px solid var(--border2);
}
.prog-top{display:flex;justify-content:space-between;margin-bottom:8px;font-family:var(--f-mono);font-size:10px}
.prog-name{color:var(--text2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-pct{color:var(--amber);font-weight:500}
.prog-track{height:2px;background:var(--border2);border-radius:99px;overflow:hidden}
.prog-bar{
  height:100%;border-radius:99px;transition:width 0.2s ease;
  background:linear-gradient(90deg,var(--amber),var(--amber2),var(--amber));
  background-size:200% 100%;
  animation:progShimmer 1.8s linear infinite;
}
@keyframes progShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* doc list */
.sec-label{
  padding:10px 16px 5px;font-family:var(--f-mono);font-size:9px;
  letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);
}
.doc-item{
  display:flex;align-items:center;gap:11px;padding:9px 14px;cursor:pointer;
  border-left:2px solid transparent;transition:all 0.2s;
  position:relative;
}
.doc-item::before{
  content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--amber-glow),transparent);
  opacity:0;transition:opacity 0.2s;
}
.doc-item:hover{border-left-color:var(--border3)}
.doc-item:hover::before{opacity:1}
.doc-item.act{background:var(--bg3);border-left-color:var(--amber)}
.doc-item.act::before{opacity:1}

.doc-thumb{
  width:30px;height:38px;border:1px solid var(--border2);border-radius:4px;
  background:var(--bg4);flex-shrink:0;position:relative;overflow:hidden;
}
.doc-thumb::before{
  content:'';position:absolute;top:0;right:0;width:9px;height:9px;
  background:var(--bg);border-left:1px solid var(--border2);border-bottom:1px solid var(--border2);
  border-radius:0 0 0 2px;
}
.doc-thumb::after{
  content:'';position:absolute;bottom:5px;left:5px;right:5px;
  height:10px;background:repeating-linear-gradient(0deg,var(--border2) 0,var(--border2) 1px,transparent 1px,transparent 3px);
  border-radius:1px;
}
.doc-info{flex:1;min-width:0}
.doc-name{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.01em}
.doc-meta{font-family:var(--f-mono);font-size:9px;color:var(--text3);margin-top:3px;display:flex;gap:8px}

/* history */
.hist-item{
  padding:11px 16px;cursor:pointer;border-left:2px solid transparent;
  transition:all 0.2s;position:relative;
}
.hist-item::before{content:'';position:absolute;inset:0;background:var(--amber-glow);opacity:0;transition:opacity 0.2s}
.hist-item:hover{border-left-color:var(--border3)}
.hist-item:hover::before{opacity:1}
.hist-q{font-size:12px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hist-meta{display:flex;justify-content:space-between;margin-top:5px;font-family:var(--f-mono);font-size:9px;color:var(--text3)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;gap:10px}
.empty-glyph{font-size:26px;color:var(--text3);line-height:1;margin-bottom:2px}
.empty-state p{font-size:12px;color:var(--text3);line-height:1.7;font-family:var(--f-mono)}

/* info card */
.info-card{margin:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px}
.info-row{display:flex;align-items:flex-start;gap:10px}
.info-icon{
  width:30px;height:30px;border-radius:8px;background:var(--amber-dim);
  border:1px solid rgba(212,146,74,0.2);display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px;
}
.info-text{font-family:var(--f-mono);font-size:10px;color:var(--text3);line-height:1.7}
.info-text strong{color:var(--text2);display:block;margin-bottom:2px;font-size:11px}
.model-badge-big{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--amber-dim);border:1px solid rgba(212,146,74,0.2);border-radius:var(--r2)}
.model-badge-big span{font-family:var(--f-mono);font-size:11px;color:var(--amber)}
.connected-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green),0 0 14px rgba(61,186,122,0.3);flex-shrink:0;animation:connPulse 2s ease-in-out infinite}
@keyframes connPulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* ════ RESIZER ════ */
.resize{
  width:5px;flex-shrink:0;cursor:col-resize;background:transparent;
  transition:background 0.2s;position:relative;z-index:5;
  display:flex;align-items:center;justify-content:center;
}
.resize::after{
  content:'';width:1px;height:40px;background:var(--border3);border-radius:1px;
  transition:all 0.2s;opacity:0.4;
}
.resize:hover::after,.resize.drag::after{background:var(--amber);height:80px;opacity:0.8}

/* ════ MID PANEL ════ */
.mid{
  flex:1;display:flex;flex-direction:column;min-width:300px;
  border-right:1px solid var(--border2);
  background:radial-gradient(ellipse at 50% 0%,var(--bg2) 0%,var(--bg) 70%);
  overflow:hidden;
}

.vtb{
  height:44px;display:flex;align-items:center;gap:8px;padding:0 16px;
  border-bottom:1px solid var(--border2);flex-shrink:0;
  background:rgba(8,8,9,0.8);backdrop-filter:blur(10px);
}
.vtb-name{
  font-family:var(--f-mono);font-size:11px;color:var(--text3);
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  letter-spacing:0.02em;
}
.vtb-name.has{color:var(--text2)}
.vtb-sep{width:1px;height:14px;background:var(--border2)}

.icon-btn{
  width:28px;height:28px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r3);color:var(--text2);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  font-family:var(--f-mono);
}
.icon-btn:hover:not(:disabled){
  background:var(--bg4);border-color:var(--border3);color:var(--text);
  transform:scale(1.05);box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.icon-btn:active:not(:disabled){transform:scale(0.95)}
.icon-btn:disabled{opacity:0.25;cursor:not-allowed}

.zoom-lbl,.page-lbl{font-family:var(--f-mono);font-size:10px;color:var(--text3);min-width:42px;text-align:center}

.pdf-wrap{
  flex:1;overflow:auto;display:flex;justify-content:center;
  align-items:flex-start;padding:28px;
  background:transparent;
}
.pdf-wrap::-webkit-scrollbar{width:5px;height:5px}
.pdf-wrap::-webkit-scrollbar-track{background:transparent}
.pdf-wrap::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px}

.pdf-canvas{
  box-shadow:0 16px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.04);
  border-radius:4px;max-width:100%;display:block;
  animation:canvasReveal 0.4s cubic-bezier(0.22,1,0.36,1);
}
@keyframes canvasReveal{from{opacity:0;transform:scale(0.97) translateY(10px)}to{opacity:1;transform:none}}

.pdf-idle{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;color:var(--text3);text-align:center;padding:40px;
}
.pdf-idle h3{
  font-family:var(--f-display);font-size:26px;color:var(--text2);
  font-weight:400;font-style:italic;letter-spacing:-0.01em;
}
.pdf-idle p{font-size:13px;color:var(--text3);max-width:220px;line-height:1.7;font-family:var(--f-mono)}
.idle-pages{display:flex;gap:10px;margin-bottom:4px;position:relative;height:70px;align-items:flex-end}
.idle-page{
  width:48px;height:62px;border:1px solid var(--border2);border-radius:5px;
  background:linear-gradient(160deg,var(--bg3),var(--bg4));
  position:relative;overflow:hidden;
}
.idle-page::before{
  content:'';position:absolute;top:8px;left:7px;right:7px;height:1.5px;
  background:var(--border3);border-radius:1px;
  box-shadow:0 4px 0 var(--border3),0 8px 0 var(--border3),0 12px 0 var(--border2);
}
.idle-page:nth-child(1){animation:idleFloat1 4s ease-in-out infinite}
.idle-page:nth-child(2){animation:idleFloat2 4s ease-in-out infinite 0.5s;height:68px}
.idle-page:nth-child(3){animation:idleFloat3 4s ease-in-out infinite 1s}
@keyframes idleFloat1{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(-5deg) translateY(-8px)}}
@keyframes idleFloat2{0%,100%{transform:rotate(0deg) translateY(0)}50%{transform:rotate(0deg) translateY(-10px)}}
@keyframes idleFloat3{0%,100%{transform:rotate(5deg) translateY(0)}50%{transform:rotate(5deg) translateY(-7px)}}

/* ════ RIGHT PANEL ════ */
.right{
  width:380px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--bg);
}

.scope-bar{
  padding:10px 16px;border-bottom:1px solid var(--border2);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  background:rgba(8,8,9,0.9);
}
.scope-lbl{font-family:var(--f-mono);font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0}
.scope-sel{
  flex:1;background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r3);padding:5px 10px;font-family:var(--f-mono);
  font-size:10px;color:var(--text2);outline:none;cursor:pointer;
  transition:border-color 0.2s;
}
.scope-sel:focus{border-color:var(--amber)}

.chat-msgs{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px;
  display:flex;flex-direction:column;gap:14px;
}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* welcome */
.welcome{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:28px 16px;gap:12px;margin-top:10px;
  animation:welcomeIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes welcomeIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:none}}

.wc-mark{
  width:60px;height:60px;border-radius:16px;
  background:linear-gradient(135deg,var(--amber-dim),rgba(212,146,74,0.04));
  border:1px solid rgba(212,146,74,0.2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-display);font-size:28px;color:var(--amber);font-style:italic;
  position:relative;overflow:hidden;
  animation:markFloat 4s ease-in-out infinite;
  box-shadow:0 0 0 0 rgba(212,146,74,0.2);
}
@keyframes markFloat{
  0%,100%{box-shadow:0 0 0 0 rgba(212,146,74,0.2),0 8px 24px rgba(0,0,0,0.3)}
  50%{box-shadow:0 0 20px 4px rgba(212,146,74,0.1),0 12px 32px rgba(0,0,0,0.4)}
}
.wc-mark::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.05),transparent);
}
.wc-title{
  font-family:var(--f-display);font-size:21px;color:var(--text);
  font-weight:600;letter-spacing:-0.02em;
}
.wc-sub{
  font-size:12px;color:var(--text3);max-width:230px;line-height:1.7;
  font-family:var(--f-mono);
}
.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px}
.chip{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:99px;padding:6px 14px;font-size:11px;color:var(--text2);
  cursor:pointer;font-family:var(--f-mono);transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing:0.01em;
  animation:chipIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes chipIn{from{opacity:0;transform:scale(0.85) translateY(8px)}to{opacity:1;transform:none}}
.chip:hover{
  background:var(--amber-dim);border-color:rgba(212,146,74,0.4);color:var(--amber);
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 4px 16px rgba(212,146,74,0.12);
}
.chip:active{transform:scale(0.97)}

/* messages */
.msg{
  display:flex;flex-direction:column;gap:4px;max-width:90%;
}
.msg.user{align-self:flex-end;animation:msgInRight 0.3s cubic-bezier(0.22,1,0.36,1) both}
.msg.bot{align-self:flex-start;animation:msgInLeft 0.3s cubic-bezier(0.22,1,0.36,1) both}
@keyframes msgInRight{from{opacity:0;transform:translateX(20px) translateY(8px)}to{opacity:1;transform:none}}
@keyframes msgInLeft{from{opacity:0;transform:translateX(-20px) translateY(8px)}to{opacity:1;transform:none}}

.msg-bub{
  padding:11px 15px;border-radius:14px;font-size:13px;line-height:1.68;
  white-space:pre-wrap;word-break:break-word;position:relative;
}
.msg.user .msg-bub{
  background:linear-gradient(145deg,var(--amber),#c07828);
  color:#fff;border-radius:14px 14px 4px 14px;
  box-shadow:0 4px 20px rgba(212,146,74,0.25),0 1px 3px rgba(0,0,0,0.3);
}
.msg.bot .msg-bub{
  background:var(--bg3);color:var(--text);
  border:1px solid var(--border2);border-radius:14px 14px 14px 4px;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
}

.msg-footer{overflow:hidden}
.msg-footer .msg-time{
  display:inline-block;font-family:var(--f-mono);font-size:9px;color:var(--text3);
  animation:fadeUp 0.35s 0.15s both;letter-spacing:0.02em;
}
.msg.user .msg-time{text-align:right;display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* typing indicator */
.typing{display:flex;gap:5px;padding:13px 16px;align-items:center}
.td{
  width:7px;height:7px;border-radius:50%;background:var(--text3);
  animation:typingDot 1.4s ease-in-out infinite;
}
.td:nth-child(2){animation-delay:0.16s}
.td:nth-child(3){animation-delay:0.32s}
@keyframes typingDot{
  0%,80%,100%{transform:scale(0.7);opacity:0.25}
  40%{transform:scale(1.1);opacity:0.9;background:var(--amber)}
}

/* typewriter cursor */
.cursor-blink{
  display:inline-block;width:2px;height:1em;background:var(--amber);
  margin-left:2px;vertical-align:text-bottom;border-radius:1px;
  animation:cursorBlink 0.65s step-end infinite;
}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}

/* chat footer */
.chat-foot{
  padding:14px 16px;border-top:1px solid var(--border2);flex-shrink:0;
  background:rgba(8,8,9,0.95);backdrop-filter:blur(10px);
}
.input-shell{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:16px;padding:10px 12px;
  transition:all 0.25s cubic-bezier(0.22,1,0.36,1);
  position:relative;overflow:hidden;
}
.input-shell::before{
  content:'';position:absolute;inset:0;border-radius:16px;
  background:linear-gradient(135deg,var(--amber-glow),transparent);
  opacity:0;transition:opacity 0.25s;pointer-events:none;
}
.input-shell:focus-within{
  border-color:rgba(212,146,74,0.4);
  box-shadow:0 0 0 3px var(--amber-dim),0 4px 20px rgba(0,0,0,0.3);
}
.input-shell:focus-within::before{opacity:1}

.msg-ta{
  flex:1;background:none;border:none;resize:none;font-family:var(--f-sans);
  font-size:13px;color:var(--text);line-height:1.55;outline:none;
  max-height:110px;min-height:22px;
}
.msg-ta::placeholder{color:var(--text3)}
.msg-ta:disabled{opacity:0.4}

.send-btn{
  width:34px;height:34px;
  background:linear-gradient(145deg,var(--amber),#b87028);
  border:none;border-radius:12px;color:#fff;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 4px 14px rgba(212,146,74,0.3);
  position:relative;overflow:hidden;
}
.send-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);
  border-radius:inherit;
}
.send-btn:disabled{opacity:0.25;cursor:not-allowed;box-shadow:none}
.send-btn:not(:disabled):hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(212,146,74,0.4);
}
.send-btn:not(:disabled):active{transform:scale(0.92);box-shadow:0 2px 8px rgba(212,146,74,0.2)}

.foot-hint{
  font-family:var(--f-mono);font-size:9px;color:var(--text3);
  margin-top:7px;padding-left:2px;letter-spacing:0.03em;
}

/* ════ TOAST ════ */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(90px);opacity:0;
  background:var(--bg4);border:1px solid var(--border3);border-radius:99px;
  padding:9px 20px;font-family:var(--f-mono);font-size:11px;color:var(--text2);
  z-index:500;transition:transform 0.35s cubic-bezier(0.22,1,0.36,1),opacity 0.35s;
  white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,0.5);
  letter-spacing:0.03em;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:rgba(224,85,85,0.35);color:var(--red)}
.toast.ok{border-color:rgba(61,186,122,0.3);color:var(--green)}

/* ════ ANIMATIONS ════ */
@keyframes slideInLeft{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:none}}

/* doc/hist entrance */
.doc-item{animation:slideInLeft 0.28s cubic-bezier(0.22,1,0.36,1) both}
.hist-item{animation:slideInLeft 0.28s cubic-bezier(0.22,1,0.36,1) both}
.info-card{animation:fadeInScale 0.3s cubic-bezier(0.22,1,0.36,1) both}

/* scrollbar global */

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────
// API key removed — requests now go through a secure serverless proxy at /api/chat

let docs = []
let activeDocName = null
let pdfDoc = null
let page = 1
let zoom = 1.2
let history = []
let chatHistory = []
let busy = false
let msgId = 0
let currentTab = 'upload'

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

// ─── INIT ────────────────────────────────────────────────────
window.onload = () => {
  renderTab()
  setupResizers()
  setupChat()
}

// ─── TABS ────────────────────────────────────────────────────
function setTab(t) {
  currentTab = t
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('act'))
  document.getElementById('t-' + t).classList.add('act')
  renderTab()
}

function renderTab() {
  const pb = document.getElementById('panel-body')
  pb.innerHTML = ''
  if (currentTab === 'upload') renderUploadTab(pb)
  else if (currentTab === 'library') renderLibraryTab(pb)
  else if (currentTab === 'history') renderHistoryTab(pb)
  else if (currentTab === 'settings') renderInfoTab(pb)
}

function renderUploadTab(pb) {
  const uz = document.createElement('div')
  uz.className = 'uz'
  uz.id = 'uz'
  uz.innerHTML = `
    <input type="file" accept=".pdf" style="display:none" id="file-inp"/>
    <div class="uz-icon">
      <div class="uz-page">
        <div class="uz-page-lines">
          <div class="uz-page-line"></div>
          <div class="uz-page-line"></div>
          <div class="uz-page-line"></div>
        </div>
      </div>
      <div class="uz-fold"></div>
    </div>
    <div class="uz-label"><strong>Drop your PDF here</strong>or click to browse</div>
    <span class="uz-hint">PDF · up to 50 MB</span>
  `
  uz.onclick = () => document.getElementById('file-inp').click()
  uz.ondragover = e => { e.preventDefault(); uz.classList.add('over') }
  uz.ondragleave = () => uz.classList.remove('over')
  uz.ondrop = e => { e.preventDefault(); uz.classList.remove('over'); const f = e.dataTransfer.files[0]; if (f) handleFile(f) }
  pb.appendChild(uz)
  document.getElementById('file-inp').onchange = e => { const f = e.target.files[0]; if (f) { handleFile(f); e.target.value = '' } }

  const pw = document.createElement('div')
  pw.id = 'prog-wrap'
  pw.className = 'prog-wrap'
  pw.style.display = 'none'
  pw.innerHTML = `
    <div class="prog-top"><span class="prog-name" id="prog-name"></span><span class="prog-pct" id="prog-pct">0%</span></div>
    <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  `
  pb.appendChild(pw)

  if (docs.length > 0) {
    const lbl = document.createElement('div')
    lbl.className = 'sec-label'
    lbl.textContent = `Indexed · ${docs.length} doc${docs.length !== 1 ? 's' : ''}`
    pb.appendChild(lbl)
    renderDocList(pb)
  }
}

function renderLibraryTab(pb) {
  if (docs.length === 0) {
    pb.innerHTML = `<div class="empty-state"><div class="empty-glyph">∅</div><p>No documents indexed yet.<br/>Upload a PDF to begin.</p></div>`
    return
  }
  const hdr = document.createElement('div')
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:12px 16px 5px'
  hdr.innerHTML = `
    <span style="font-family:var(--f-mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em">${docs.length} document${docs.length !== 1 ? 's' : ''}</span>
    <button onclick="clearAll()" style="padding:3px 12px;background:transparent;border:1px solid rgba(224,85,85,0.25);border-radius:99px;color:var(--red);font-family:var(--f-mono);font-size:9px;cursor:pointer;letter-spacing:0.04em;transition:all 0.2s" onmouseover="this.style.background='rgba(224,85,85,0.08)'" onmouseout="this.style.background='transparent'">clear all</button>
  `
  pb.appendChild(hdr)
  renderDocList(pb)
}

function renderDocList(pb) {
  docs.forEach((d, idx) => {
    const item = document.createElement('div')
    item.className = `doc-item${activeDocName === d.filename ? ' act' : ''}`
    item.style.animationDelay = `${idx * 55}ms`
    item.innerHTML = `
      <div class="doc-thumb"></div>
      <div class="doc-info">
        <div class="doc-name" title="${d.filename}">${d.filename}</div>
        <div class="doc-meta"><span>${d.pages}p</span><span>${d.chunks} chunks</span></div>
      </div>
    `
    item.onclick = () => selectDoc(d.filename)
    pb.appendChild(item)
  })
}

function renderHistoryTab(pb) {
  if (history.length === 0) {
    pb.innerHTML = `<div class="empty-state"><div class="empty-glyph">◌</div><p>Your conversation history<br/>will appear here.</p></div>`
    return
  }
  const lbl = document.createElement('div')
  lbl.className = 'sec-label'
  lbl.textContent = `${history.length} question${history.length !== 1 ? 's' : ''}`
  pb.appendChild(lbl)
  ;[...history].reverse().forEach((h, idx) => {
    const item = document.createElement('div')
    item.className = 'hist-item'
    item.style.animationDelay = `${idx * 45}ms`
    item.innerHTML = `
      <div class="hist-q">${h.q}</div>
      <div class="hist-meta"><span>${h.src || 'all documents'}</span><span>${new Date(h.ts).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}</span></div>
    `
    item.onclick = () => { setInput(h.q); document.getElementById('msg-ta').focus() }
    pb.appendChild(item)
  })
}

function renderInfoTab(pb) {
  pb.innerHTML = ''
  const card = document.createElement('div')
  card.className = 'info-card'
  card.innerHTML = `
    <div style="font-family:var(--f-mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px">Powered by</div>
    <div class="model-badge-big">
      <div class="connected-dot"></div>
      <span>llama-3.3-70b · groq · xAI</span>
    </div>
    <div class="info-row" style="margin-top:4px">
      <div class="info-icon">🔒</div>
      <div class="info-text"><strong>Private by default</strong>Documents are processed locally in your browser. Text is sent to the API only to answer your questions.</div>
    </div>
    <div class="info-row">
      <div class="info-icon">⚡</div>
      <div class="info-text"><strong>Word-by-word streaming</strong>Answers appear token by token as the model generates them.</div>
    </div>
    <div class="info-row">
      <div class="info-icon">📄</div>
      <div class="info-text"><strong>Smart chunking</strong>Documents are split into overlapping chunks and the most relevant sections are retrieved per question.</div>
    </div>
  `
  pb.appendChild(card)
}

// ─── FILE HANDLING ────────────────────────────────────────────
async function handleFile(file) {
  if (!file || file.type !== 'application/pdf') { toast('Please upload a PDF file', 'err'); return }
  if (file.size > 52428800) { toast('File too large (max 50 MB)', 'err'); return }

  setProgress(true, file.name, 10)
  try {
    const buf = await file.arrayBuffer()
    setProgress(true, file.name, 30)
    const viewDoc = await pdfjsLib.getDocument({ data: buf.slice() }).promise
    setProgress(true, file.name, 50)
    const text = await extractText(viewDoc, (p, t) => setProgress(true, file.name, 50 + (p / t) * 35))
    setProgress(true, file.name, 88)
    const chunks = chunkText(text)
    setProgress(true, file.name, 95)

    const docEntry = { filename: file.name, pages: viewDoc.numPages, chunks: chunks.length, text, chunkArr: chunks, file, viewDoc }

    const idx = docs.findIndex(d => d.filename === file.name)
    if (idx >= 0) docs[idx] = docEntry
    else docs.push(docEntry)

    setProgress(false)
    updateDocBadge()
    selectDoc(file.name, viewDoc)
    updateScopeSelect()
    suggestChips(text)
    renderTab()
    toast(`${file.name} indexed (${chunks.length} chunks)`, 'ok')
  } catch (err) {
    setProgress(false)
    toast('Failed to load PDF: ' + err.message, 'err')
    console.error(err)
  }
}

function setProgress(show, name, pct) {
  const pw = document.getElementById('prog-wrap')
  if (!pw) return
  if (!show) { pw.style.display = 'none'; return }
  pw.style.display = 'block'
  document.getElementById('prog-name').textContent = name || ''
  document.getElementById('prog-pct').textContent = Math.round(pct) + '%'
  document.getElementById('prog-bar').style.width = pct + '%'
}

async function extractText(pdfDoc, onProgress) {
  let fullText = ''
  for (let i = 1; i <= pdfDoc.numPages; i++) {
    const pg = await pdfDoc.getPage(i)
    const tc = await pg.getTextContent()
    const pageText = tc.items.map(item => item.str).join(' ')
    fullText += `\n--- Page ${i} ---\n` + pageText
    if (onProgress) onProgress(i, pdfDoc.numPages)
  }
  return fullText
}

function chunkText(text, size = 1500, overlap = 200) {
  const chunks = []
  let i = 0
  while (i < text.length) {
    chunks.push(text.slice(i, i + size))
    i += size - overlap
    if (i < 0) i = 0
  }
  return chunks
}

// ─── PDF VIEWER ───────────────────────────────────────────────
async function selectDoc(name, providedPdfDoc) {
  activeDocName = name
  const d = docs.find(d => d.filename === name)
  if (!d) return

  document.getElementById('pdf-name').textContent = name
  document.getElementById('pdf-name').className = 'vtb-name has'

  pdfDoc = providedPdfDoc || d.viewDoc || null
  if (!pdfDoc && d.file) {
    const buf = await d.file.arrayBuffer()
    pdfDoc = await pdfjsLib.getDocument({ data: buf }).promise
    d.viewDoc = pdfDoc
  }

  if (pdfDoc) {
    page = 1
    await renderPage()
    document.getElementById('pdf-idle').style.display = 'none'
    document.getElementById('pdf-canvas').style.display = 'block'
  }

  document.getElementById('scope-sel').value = name
  renderTab()
}

async function renderPage() {
  if (!pdfDoc) return
  const pg = await pdfDoc.getPage(page)
  const vp = pg.getViewport({ scale: zoom })
  const canvas = document.getElementById('pdf-canvas')
  canvas.width = vp.width; canvas.height = vp.height
  await pg.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise
  document.getElementById('page-lbl').textContent = `${page} / ${pdfDoc.numPages}`
  document.getElementById('pg-prev').disabled = page <= 1
  document.getElementById('pg-next').disabled = page >= pdfDoc.numPages
}

function prevPage() { if (page > 1) { page--; renderPage() } }
function nextPage() { if (pdfDoc && page < pdfDoc.numPages) { page++; renderPage() } }
function zoomIn() { zoom = Math.min(3, zoom + 0.2); document.getElementById('zoom-lbl').textContent = Math.round(zoom * 100) + '%'; renderPage() }
function zoomOut() { zoom = Math.max(0.5, zoom - 0.2); document.getElementById('zoom-lbl').textContent = Math.round(zoom * 100) + '%'; renderPage() }

// ─── CHAT ─────────────────────────────────────────────────────
function setupChat() {
  const ta = document.getElementById('msg-ta')
  const btn = document.getElementById('send-btn')
  ta.addEventListener('input', () => {
    ta.style.height = 'auto'
    ta.style.height = Math.min(ta.scrollHeight, 110) + 'px'
    btn.disabled = !ta.value.trim() || busy
  })
  ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() } })
  btn.addEventListener('click', sendMessage)
}

function setInput(q) {
  const ta = document.getElementById('msg-ta')
  ta.value = q
  ta.style.height = 'auto'
  ta.style.height = Math.min(ta.scrollHeight, 110) + 'px'
  document.getElementById('send-btn').disabled = !q.trim() || busy
}

async function sendMessage() {
  const ta = document.getElementById('msg-ta')
  const q = ta.value.trim()
  if (!q || busy) return

  const scope = document.getElementById('scope-sel').value
  ta.value = ''; ta.style.height = 'auto'; setBusy(true)
  document.getElementById('welcome').style.display = 'none'
  document.getElementById('send-btn').disabled = true

  history.push({ q, src: scope, ts: Date.now() })
  updateHistBadge()

  appendMsg('user', q)
  const botId = ++msgId
  appendBotTyping(botId)

  try {
    const context = buildContext(q, scope)
    const answer = await callGroq(q, context, botId)
    chatHistory.push({ role: 'user', content: q })
    chatHistory.push({ role: 'assistant', content: answer })
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20)
  } catch (err) {
    updateMsg(botId, '⚠ ' + err.message, false)
  }
  setBusy(false)
  ta.focus()
  if (currentTab === 'history') renderTab()
}

function buildContext(q, scope) {
  const targetDocs = scope ? docs.filter(d => d.filename === scope) : docs
  if (targetDocs.length === 0) return ''
  const qWords = q.toLowerCase().split(/\s+/).filter(w => w.length > 3)
  let allChunks = []
  targetDocs.forEach(d => { d.chunkArr.forEach(c => allChunks.push({ c, doc: d.filename })) })
  const scored = allChunks.map(({ c, doc }) => {
    const cl = c.toLowerCase()
    const score = qWords.reduce((s, w) => s + (cl.split(w).length - 1), 0)
    return { c, doc, score }
  })
  scored.sort((a, b) => b.score - a.score)
  const top = scored.slice(0, 6).map(x => `[From: ${x.doc}]\n${x.c}`).join('\n\n---\n\n')
  return top
}

async function callGroq(q, context, botId) {
  const systemPrompt = `You are folio, an expert AI assistant specialized in reading, analyzing, and explaining PDF documents.

Your role:
- Answer questions accurately using the provided document excerpts
- Be thorough but concise — give direct, useful answers without unnecessary padding
- When relevant, mention which page or section information comes from
- If a question spans multiple documents, synthesize clearly and cite each source
- If the answer isn't in the context, say so honestly rather than guessing
- For complex questions, structure your answer with clear paragraphs or numbered points
- Detect document type (legal, academic, financial, technical, etc.) and adapt your tone accordingly

Formatting:
- Use line breaks between distinct points
- For lists, use simple dashes (-)
- Keep responses readable in a chat interface (no markdown headers or bold syntax)
- Be conversational but authoritative`

  const trimmedContext = context ? context.slice(0, 3000) : ''
  const userContent = trimmedContext
    ? `Here are the most relevant excerpts from the document(s):\n\n${trimmedContext}\n\n---\n\nUser question: ${q}`
    : `The user asked: "${q}"\n\nNo document has been uploaded yet. Politely let them know they need to upload a PDF first.`

  const messages = [
    ...chatHistory.slice(-4),
    { role: 'user', content: userContent }
  ]

  let res, data
  try {
    res = await fetch('/api/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1024,
        messages: [{ role: 'system', content: systemPrompt }, ...messages],
        stream: false
      })
    })
    data = await res.json()
  } catch (networkErr) {
    console.error('Fetch error:', networkErr)
    throw new Error('Network error — could not reach the server. Try again in a moment.')
  }

  if (!res.ok) {
    console.error('API error:', res.status, JSON.stringify(data))
    let msg = data?.error?.message || `HTTP ${res.status}`
    if (res.status === 401) msg = 'Invalid API key'
    if (res.status === 429) msg = 'Rate limit — wait a moment and try again'
    throw new Error(msg)
  }

  const ans = data?.choices?.[0]?.message?.content || '(no response)'
  updateMsg(botId, ans, false)
  return ans
}

// ─── MSG DOM ──────────────────────────────────────────────────
function appendMsg(role, text) {
  const id = ++msgId
  const container = document.getElementById('chat-msgs')
  const div = document.createElement('div')
  div.className = `msg ${role}`
  div.id = `msg-${id}`
  div.innerHTML = `<div class="msg-bub">${escHtml(text)}</div><div class="msg-footer"><span class="msg-time">${timeStr()}</span></div>`
  container.appendChild(div)
  scrollChat()
  return id
}

function appendBotTyping(id) {
  const container = document.getElementById('chat-msgs')
  const div = document.createElement('div')
  div.className = 'msg bot streaming'
  div.id = `msg-${id}`
  div.innerHTML = `<div class="msg-bub"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div><div class="msg-footer"><span class="msg-time">${timeStr()}</span></div>`
  container.appendChild(div)
  scrollChat()
}

function updateMsg(id, text, streaming) {
  const div = document.getElementById(`msg-${id}`)
  if (!div) return
  div.className = `msg bot`
  const bub = document.createElement('div')
  bub.className = 'msg-bub'
  div.innerHTML = ''
  div.appendChild(bub)
  div.insertAdjacentHTML('beforeend', `<div class="msg-footer"><span class="msg-time">${timeStr()}</span></div>`)

  const words = text.split(/(\s+)/)
  let i = 0
  const cursor = document.createElement('span')
  cursor.className = 'cursor-blink'
  bub.appendChild(cursor)

  function typeWord() {
    if (i >= words.length) { cursor.remove(); scrollChat(); return }
    const chunk = words[i++]
    const node = document.createTextNode(chunk)
    bub.insertBefore(node, cursor)
    scrollChat()
    const delay = chunk.trim().length === 0 ? 0 : Math.max(14, 32 - chunk.length)
    setTimeout(typeWord, delay)
  }
  typeWord()
  scrollChat()
}

function scrollChat() {
  const c = document.getElementById('chat-msgs')
  c.scrollTop = c.scrollHeight
}

// ─── CHIPS ────────────────────────────────────────────────────
function suggestChips(text) {
  const sample = text.slice(0, 3000).toLowerCase()
  const chips = []
  if (sample.includes('introduction') || sample.includes('abstract')) chips.push('Summarize this document')
  if (sample.includes('conclusion') || sample.includes('summary')) chips.push('What are the key conclusions?')
  if (sample.includes('table') || sample.includes('figure')) chips.push('What tables or figures are included?')
  chips.push('What is this document about?')
  if (sample.includes('method') || sample.includes('approach')) chips.push('Explain the methodology')
  const chipsEl = document.getElementById('chips')
  if (!chipsEl) return
  chipsEl.innerHTML = ''
  chips.slice(0, 4).forEach((c, idx) => {
    const btn = document.createElement('button')
    btn.className = 'chip'
    btn.style.animationDelay = `${idx * 80}ms`
    btn.textContent = c
    btn.onclick = () => { setInput(c); sendMessage() }
    chipsEl.appendChild(btn)
  })
}

// ─── HELPERS ─────────────────────────────────────────────────
function setBusy(b) {
  busy = b
  const ta = document.getElementById('msg-ta')
  const btn = document.getElementById('send-btn')
  ta.disabled = b
  if (!b) { btn.disabled = !ta.value.trim(); setOrbState('ready') }
  else { btn.disabled = true; setOrbState('thinking') }
}

function setOrbState(state) {
  const orb = document.getElementById('orb')
  const lbl = document.getElementById('orb-lbl')
  orb.className = state === 'thinking' ? 'orb thinking' : 'orb'
  lbl.textContent = state === 'thinking' ? 'thinking…' : 'ready'
}

function updateDocBadge() {
  document.getElementById('doc-badge').textContent = `${docs.length} document${docs.length !== 1 ? 's' : ''}`
  const lb = document.getElementById('lib-badge')
  if (docs.length > 0) { lb.textContent = docs.length; lb.style.display = 'inline-flex' }
  else lb.style.display = 'none'
}

function updateHistBadge() {
  const hb = document.getElementById('hist-badge')
  if (history.length > 0) { hb.textContent = history.length; hb.style.display = 'inline-flex' }
  else hb.style.display = 'none'
}

function updateScopeSelect() {
  const sel = document.getElementById('scope-sel')
  sel.innerHTML = '<option value="">All documents</option>'
  docs.forEach(d => {
    const opt = document.createElement('option')
    opt.value = d.filename; opt.textContent = d.filename
    sel.appendChild(opt)
  })
  if (activeDocName) sel.value = activeDocName
}

function clearAll() {
  if (!confirm('Clear all indexed documents?')) return
  docs = []; activeDocName = null; pdfDoc = null
  document.getElementById('pdf-canvas').style.display = 'none'
  document.getElementById('pdf-idle').style.display = 'flex'
  document.getElementById('pdf-name').textContent = 'No document open'
  document.getElementById('pdf-name').className = 'vtb-name'
  document.getElementById('page-lbl').textContent = '— / —'
  updateScopeSelect(); updateDocBadge(); renderTab()
  toast('All documents cleared')
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>')
}

function timeStr() {
  return new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' })
}

let _toastTimer
function toast(msg, type) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = 'toast show' + (type ? ' ' + type : '')
  clearTimeout(_toastTimer)
  _toastTimer = setTimeout(() => { el.className = 'toast' }, 2800)
}

// ─── RESIZERS ─────────────────────────────────────────────────
function setupResizers() {
  makeResizer('resize1', 'left-panel', 'mid-panel', 200, 400, 300, 9999)
  makeResizer('resize2', 'mid-panel', 'right-panel', 300, 9999, 280, 520)
}

function makeResizer(resId, leftId, rightId, minL, maxL, minR, maxR) {
  const res = document.getElementById(resId)
  res.addEventListener('mousedown', e => {
    e.preventDefault()
    const lp = document.getElementById(leftId)
    const rp = document.getElementById(rightId)
    const startX = e.clientX, lw = lp.offsetWidth, rw = rp.offsetWidth
    res.classList.add('drag')
    document.body.style.userSelect = 'none'
    document.body.style.cursor = 'col-resize'
    const onMove = e => {
      const dx = e.clientX - startX
      const nl = lw + dx, nr = rw - dx
      if (nl >= minL && nl <= maxL && nr >= minR && nr <= maxR) {
        lp.style.width = nl + 'px'
        rp.style.width = nr + 'px'
        rp.style.flexShrink = '0'
        lp.style.flexShrink = '0'
      }
    }
    const onUp = () => {
      res.classList.remove('drag')
      document.body.style.userSelect = ''
      document.body.style.cursor = ''
      document.removeEventListener('mousemove', onMove)
      document.removeEventListener('mouseup', onUp)
    }
    document.addEventListener('mousemove', onMove)
    document.addEventListener('mouseup', onUp)
  })
}
